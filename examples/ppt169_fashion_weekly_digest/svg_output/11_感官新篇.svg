  <text x="640" y="105" font-family="Georgia, SimSun, serif" font-size="14" fill="#C9A96E" text-anchor="middle" letter-spacing="2">BOSS × FRESH</text>

  <rect x="635" y="120" width="1" height="530" fill="#2A2520"/>

