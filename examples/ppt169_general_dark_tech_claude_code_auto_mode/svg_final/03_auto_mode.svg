<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="p3glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="accentLine3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A574" />
      <stop offset="100%" stop-color="#60A5FA" />
    </linearGradient>
  </defs>

  
  <rect width="1280" height="720" fill="#0D1117" />
  <rect width="1280" height="720" fill="url(#p3glow)" />

  
  <g id="header">
    <rect x="60" y="50" width="4" height="30" fill="#D4A574" />
    <text x="76" y="75" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#8B949E" letter-spacing="3">INTRODUCING</text>
  </g>

  
  <g id="title">
    <text x="640" y="155" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="bold" fill="#E6EDF3">Auto Mode</text>
    <text x="640" y="195" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="20" fill="#D4A574">Classifier-Delegated Approvals</text>
  </g>

  
  <g id="definition">
    <rect x="160" y="230" width="960" height="2" fill="url(#accentLine3)" fill-opacity="0.4" />
    <text x="640" y="280" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="18" fill="#E6EDF3">A new mode for Claude Code that delegates permission decisions</text>
    <text x="640" y="308" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="18" fill="#E6EDF3">to model-based classifiers — a middle ground between</text>
    <text x="640" y="336" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="18" fill="#8B949E">manual review and no guardrails.</text>
    <rect x="160" y="360" width="960" height="2" fill="url(#accentLine3)" fill-opacity="0.4" />
  </g>

  
  <g id="pillar-1">
    
  <g transform="translate(230.0, 420.0) scale(2.5)" fill="#D4A574">
    <path d="M0 3H16V1H0V3Z" />
    <path d="M2 7H14V5H2V7Z" />
    <path d="M4 11H12V9H4V11Z" />
    <path d="M10 15H6V13H10V15Z" />
  </g>
    <text x="250" y="490" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#E6EDF3">Catch Danger</text>
    <text x="250" y="518" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" fill="#8B949E">Block actions misaligned</text>
    <text x="250" y="538" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" fill="#8B949E">with user intent</text>
  </g>

  <rect x="420" y="420" width="1" height="130" fill="#30363D" />

  <g id="pillar-2">
    
  <g transform="translate(620.0, 420.0) scale(2.5)" fill="#60A5FA">
    <path d="M9 7L10 0H8L2 7V9H7L6 16H8L14 9L14 7H9Z" />
  </g>
    <text x="640" y="490" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#E6EDF3">Stay Fast</text>
    <text x="640" y="518" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" fill="#8B949E">Let safe actions run</text>
    <text x="640" y="538" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" fill="#8B949E">without approval prompts</text>
  </g>

  <rect x="860" y="420" width="1" height="130" fill="#30363D" />

  <g id="pillar-3">
    
  <g transform="translate(1010.0, 420.0) scale(2.5)" fill="#34D399">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M9 0V2H13L16 8.5L13 15H3L0 8.5L3 2H7V0H9ZM4.59794 11.7384L8 12.2618L11.4021 11.7384L11.0979 9.76163L8 10.2382L4.90206 9.76163L4.59794 11.7384ZM7 6.75C7 7.44036 6.44036 8 5.75 8C5.05964 8 4.5 7.44036 4.5 6.75C4.5 6.05964 5.05964 5.5 5.75 5.5C6.44036 5.5 7 6.05964 7 6.75ZM10.25 8C10.9404 8 11.5 7.44036 11.5 6.75C11.5 6.05964 10.9404 5.5 10.25 5.5C9.55964 5.5 9 6.05964 9 6.75C9 7.44036 9.55964 8 10.25 8Z" />
  </g>
    <text x="1030" y="490" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#E6EDF3">Keep Autonomy</text>
    <text x="1030" y="518" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" fill="#8B949E">Reduce friction without</text>
    <text x="1030" y="538" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" fill="#8B949E">sacrificing safety</text>
  </g>

  
  <g id="tagline">
    <path fill="#161B22" stroke="#30363D" stroke-width="1" d="M400,620 H880 A20,20 0 0 1 900,640 V640 A20,20 0 0 1 880,660 H400 A20,20 0 0 1 380,640 V640 A20,20 0 0 1 400,620 Z" />
    <text x="640" y="646" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" fill="#D4A574">Get started: claude auto-mode defaults</text>
  </g>

  
  <g id="footer">
    <text x="1220" y="700" text-anchor="end" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#6E7681">03 / 10</text>
  </g>
</svg>