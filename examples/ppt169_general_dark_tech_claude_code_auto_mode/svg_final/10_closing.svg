      <stop offset="100%" stop-color="#D4A574" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="p10glow2" cx="35%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#34D399" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="closingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
