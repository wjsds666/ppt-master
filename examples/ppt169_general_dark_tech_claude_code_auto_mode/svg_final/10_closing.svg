  <rect x="520" y="400" width="240" height="2" fill="url(#closingGrad)" fill-opacity="0.6" />

  
  <g id="closing-points">
    <text x="640" y="445" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="18" fill="#8B949E">The classifier doesn't need to be flawless to be valuable.</text>
    <text x="640" y="475" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="18" fill="#8B949E">The starting point is catching enough dangerous actions</text>
    <text x="640" y="505" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="18" fill="#8B949E">to make autonomous operation substantially safer.</text>
  </g>

  
