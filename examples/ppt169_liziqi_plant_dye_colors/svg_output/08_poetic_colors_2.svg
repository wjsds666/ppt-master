<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="imgShadow08" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#F7F2E8"/>

  <g id="header">
    <text x="60" y="50" font-family="KaiTi, STKaiti, Georgia, serif" font-size="14" fill="#9B948B" letter-spacing="3">CHAPTER 03 · 诗意之色（下）</text>
    <line x1="60" y1="62" x2="290" y2="62" stroke="#C99E62" stroke-width="2"/>
    <text x="60" y="108" font-family="KaiTi, STKaiti, Georgia, serif" font-size="38" font-weight="bold" fill="#3A3530" letter-spacing="3">画眉深青 · 相思成灰</text>
    <text x="60" y="140" font-family="KaiTi, STKaiti, Georgia, serif" font-size="18" fill="#7A7068" letter-spacing="2">一寸相思一寸灰 · 一画青黛映春山</text>
  </g>

  <line x1="640" y1="180" x2="640" y2="660" stroke="#D7CEB9" stroke-width="1" stroke-dasharray="4,4"/>

  <g id="color-daiqing" transform="translate(60,180)">
    <g transform="translate(0,0)">
      <rect x="-4" y="-4" width="288" height="208" fill="#EDE5D3" stroke="#3D4A5A" stroke-width="1"/>
      <image href="../images/640_12.png" x="0" y="0" width="280" height="200" preserveAspectRatio="xMidYMid slice" filter="url(#imgShadow08)"/>
      <text x="140" y="220" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="13" fill="#9B948B">黛青 · 画眉深色</text>
    </g>

    <g transform="translate(310,0)">
      <rect x="0" y="0" width="260" height="200" rx="4" fill="#3D4A5A"/>
      <rect x="10" y="10" width="240" height="180" fill="none" stroke="#F7F2E8" stroke-width="1" stroke-opacity="0.6"/>
      <text x="130" y="80" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="56" font-weight="bold" fill="#F7F2E8" letter-spacing="4">黛青</text>
      <text x="130" y="130" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="16" fill="#F7F2E8" letter-spacing="2">蓝草提取</text>
      <text x="130" y="170" text-anchor="middle" font-family="Arial" font-size="13" fill="#F7F2E8" letter-spacing="3">#3D4A5A</text>
    </g>

    <g transform="translate(0,260)">
      <use data-icon="tabler-filled/quote" x="0" y="0" width="24" height="24" fill="#3D4A5A"/>
      <text x="34" y="18" font-family="KaiTi, STKaiti, Georgia, serif" font-size="19" fill="#3A3530" font-weight="bold">眉黛青颦 · 莲脸生春</text>
      <text x="34" y="46" font-family="KaiTi, STKaiti, Georgia, serif" font-size="19" fill="#3A3530" font-weight="bold">倾国倾城 · 崔莺莺之容</text>
      <text x="34" y="74" font-family="KaiTi, STKaiti, Georgia, serif" font-size="15" fill="#9B948B" font-style="italic">— 元 · 王实甫《西厢记》</text>
    </g>

    <g transform="translate(0,370)">
      <rect x="0" y="0" width="570" height="78" rx="6" fill="#EDE5D3"/>
      <g transform="translate(20,20)">
        <use data-icon="tabler-filled/leaf" x="0" y="0" width="20" height="20" fill="#3D4A5A"/>
        <text x="30" y="16" font-family="KaiTi, STKaiti, Georgia, serif" font-size="17" fill="#3A3530" font-weight="bold">染料 · 青出于蓝</text>
      </g>
      <text x="20" y="64" font-family="KaiTi, STKaiti, Georgia, serif" font-size="16" fill="#7A7068" letter-spacing="1">从蓝草中提取青黛，古代女子画眉常用之色</text>
    </g>
  </g>

  <g id="color-xiangsi" transform="translate(670,180)">
    <g transform="translate(0,0)">
      <rect x="-4" y="-4" width="288" height="208" fill="#EDE5D3" stroke="#A69E98" stroke-width="1"/>
      <image href="../images/640_13.png" x="0" y="0" width="280" height="200" preserveAspectRatio="xMidYMid slice" filter="url(#imgShadow08)"/>
      <text x="140" y="220" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="13" fill="#9B948B">相思灰 · 想象之色</text>
    </g>

    <g transform="translate(310,0)">
      <rect x="0" y="0" width="240" height="200" rx="4" fill="#A69E98"/>
      <rect x="10" y="10" width="220" height="180" fill="none" stroke="#F7F2E8" stroke-width="1" stroke-opacity="0.6"/>
      <text x="120" y="80" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="48" font-weight="bold" fill="#F7F2E8" letter-spacing="4">相思</text>
      <text x="120" y="128" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="48" font-weight="bold" fill="#F7F2E8" letter-spacing="4">灰</text>
      <text x="120" y="170" text-anchor="middle" font-family="Arial" font-size="13" fill="#F7F2E8" letter-spacing="3">#A69E98</text>
    </g>

    <g transform="translate(0,260)">
      <use data-icon="tabler-filled/heart" x="0" y="0" width="24" height="24" fill="#B04A5C"/>
      <text x="34" y="18" font-family="KaiTi, STKaiti, Georgia, serif" font-size="19" fill="#3A3530" font-weight="bold">春心莫共花争发</text>
      <text x="34" y="46" font-family="KaiTi, STKaiti, Georgia, serif" font-size="19" fill="#3A3530" font-weight="bold">一寸相思一寸灰</text>
      <text x="34" y="74" font-family="KaiTi, STKaiti, Georgia, serif" font-size="15" fill="#9B948B" font-style="italic">— 唐 · 李商隐 · 催生相思灰色名</text>
    </g>

    <g transform="translate(0,370)">
      <rect x="0" y="0" width="550" height="78" rx="6" fill="#EDE5D3"/>
      <g transform="translate(20,20)">
        <use data-icon="tabler-filled/palette" x="0" y="0" width="20" height="20" fill="#7A7068"/>
        <text x="30" y="16" font-family="KaiTi, STKaiti, Georgia, serif" font-size="17" fill="#3A3530" font-weight="bold">配方 · 染出浅灰</text>
      </g>
      <text x="20" y="64" font-family="KaiTi, STKaiti, Georgia, serif" font-size="16" fill="#7A7068" letter-spacing="1">茶叶 / 石榴皮作染料，以少许皂矾作媒染剂</text>
    </g>
  </g>

  <g id="bottom-strip" transform="translate(60,660)">
    <rect x="0" y="0" width="1160" height="32" rx="16" fill="#EDE5D3"/>
    <text x="30" y="21" font-family="KaiTi, STKaiti, Georgia, serif" font-size="15" fill="#7A7068">若说颜色有情 · 相思灰则最为情深</text>
    <text x="1130" y="21" text-anchor="end" font-family="KaiTi, STKaiti, Georgia, serif" font-size="13" fill="#9B948B">08 / 12</text>
  </g>
</svg>
