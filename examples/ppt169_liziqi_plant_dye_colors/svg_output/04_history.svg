<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="scrollOverlay04" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F7F2E8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#F7F2E8" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="timelineGrad04" gradientUnits="userSpaceOnUse" x1="90" y1="0" x2="1190" y2="0">
      <stop offset="0%" stop-color="#C99E62"/>
      <stop offset="50%" stop-color="#6B9AAE"/>
      <stop offset="100%" stop-color="#6F8F75"/>
    </linearGradient>
    <filter id="nodeShadow04" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#F7F2E8"/>

  <g id="scroll-decor" transform="translate(0,60)">
    <image href="../images/640_1.png" x="0" y="0" width="1280" height="180" preserveAspectRatio="xMidYMid slice"/>
    <rect x="0" y="0" width="1280" height="180" fill="url(#scrollOverlay04)"/>
  </g>

  <g id="header">
    <text x="60" y="42" font-family="KaiTi, STKaiti, Georgia, serif" font-size="14" fill="#9B948B" letter-spacing="3">CHAPTER 01 · 千年染技</text>
    <line x1="60" y1="54" x2="240" y2="54" stroke="#C99E62" stroke-width="2"/>
  </g>

  <g id="title-overlay" transform="translate(60,190)">
    <text x="0" y="0" font-family="KaiTi, STKaiti, Georgia, serif" font-size="40" font-weight="bold" fill="#3A3530" letter-spacing="3">染色之术 · 远始轩辕之世</text>
    <text x="0" y="32" font-family="KaiTi, STKaiti, Georgia, serif" font-size="18" fill="#7A7068" letter-spacing="2">史书载：「黄帝制玄冠黄裳，以草木之汁，染成文彩。」</text>
  </g>

  <g id="scroll-caption">
    <text x="1220" y="236" text-anchor="end" font-family="KaiTi, STKaiti, Georgia, serif" font-size="13" fill="#9B948B" font-style="italic">唐 · 张萱《捣练图》（局部） · 美国波士顿美术博物馆藏</text>
  </g>

  <g id="timeline-main" transform="translate(0,460)">
    <line x1="90" y1="0" x2="1190" y2="0" stroke="url(#timelineGrad04)" stroke-width="4" stroke-linecap="round"/>

    <g transform="translate(140,0)">
      <circle cx="0" cy="0" r="20" fill="#FFFFFF" stroke="#C99E62" stroke-width="3" filter="url(#nodeShadow04)"/>
      <circle cx="0" cy="0" r="9" fill="#C99E62"/>
      <rect x="-90" y="-120" width="180" height="90" rx="8" fill="#FFFFFF" stroke="#D7CEB9" stroke-width="1" filter="url(#nodeShadow04)"/>
      <text x="0" y="-96" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="18" font-weight="bold" fill="#C99E62">轩辕之世</text>
      <text x="0" y="-72" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="15" fill="#3A3530">黄帝</text>
      <text x="0" y="-52" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="15" fill="#3A3530">制玄冠黄裳</text>
      <line x1="0" y1="-20" x2="0" y2="-30" stroke="#C99E62" stroke-width="2" stroke-dasharray="3,3"/>
      <text x="0" y="56" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="14" fill="#7A7068" letter-spacing="2">起源</text>
    </g>

    <g transform="translate(400,0)">
      <circle cx="0" cy="0" r="20" fill="#FFFFFF" stroke="#C99E62" stroke-width="3" filter="url(#nodeShadow04)"/>
      <circle cx="0" cy="0" r="9" fill="#C99E62"/>
      <rect x="-90" y="34" width="180" height="100" rx="8" fill="#FFFFFF" stroke="#D7CEB9" stroke-width="1" filter="url(#nodeShadow04)"/>
      <text x="0" y="58" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="18" font-weight="bold" fill="#C99E62">西周</text>
      <text x="0" y="86" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="15" fill="#3A3530">设专职「染人」</text>
      <text x="0" y="108" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="13" fill="#9B948B">染色之官 · 始有分职</text>
      <line x1="0" y1="20" x2="0" y2="34" stroke="#C99E62" stroke-width="2" stroke-dasharray="3,3"/>
      <text x="0" y="-34" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="14" fill="#7A7068" letter-spacing="2">制度化</text>
    </g>

    <g transform="translate(660,0)">
      <circle cx="0" cy="0" r="20" fill="#FFFFFF" stroke="#6B9AAE" stroke-width="3" filter="url(#nodeShadow04)"/>
      <circle cx="0" cy="0" r="9" fill="#6B9AAE"/>
      <rect x="-90" y="-120" width="180" height="90" rx="8" fill="#FFFFFF" stroke="#D7CEB9" stroke-width="1" filter="url(#nodeShadow04)"/>
      <text x="0" y="-96" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="18" font-weight="bold" fill="#6B9AAE">秦朝</text>
      <text x="0" y="-72" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="15" fill="#3A3530">设「染色司」</text>
      <text x="0" y="-52" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="13" fill="#9B948B">国家机构 · 统一规制</text>
      <line x1="0" y1="-20" x2="0" y2="-30" stroke="#6B9AAE" stroke-width="2" stroke-dasharray="3,3"/>
      <text x="0" y="56" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="14" fill="#7A7068" letter-spacing="2">官营</text>
    </g>

    <g transform="translate(920,0)">
      <circle cx="0" cy="0" r="20" fill="#FFFFFF" stroke="#6F8F75" stroke-width="3" filter="url(#nodeShadow04)"/>
      <circle cx="0" cy="0" r="9" fill="#6F8F75"/>
      <rect x="-90" y="34" width="180" height="100" rx="8" fill="#FFFFFF" stroke="#D7CEB9" stroke-width="1" filter="url(#nodeShadow04)"/>
      <text x="0" y="58" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="18" font-weight="bold" fill="#6F8F75">唐宋</text>
      <text x="0" y="86" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="15" fill="#3A3530">设「染院」</text>
      <text x="0" y="108" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="13" fill="#9B948B">宋徽宗御批 · 雨过天青</text>
      <line x1="0" y1="20" x2="0" y2="34" stroke="#6F8F75" stroke-width="2" stroke-dasharray="3,3"/>
      <text x="0" y="-34" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="14" fill="#7A7068" letter-spacing="2">巅峰</text>
    </g>

    <g transform="translate(1150,0)">
      <circle cx="-10" cy="0" r="20" fill="#FFFFFF" stroke="#B04A5C" stroke-width="3" filter="url(#nodeShadow04)"/>
      <circle cx="-10" cy="0" r="9" fill="#B04A5C"/>
      <rect x="-100" y="-120" width="180" height="90" rx="8" fill="#FFFFFF" stroke="#D7CEB9" stroke-width="1" filter="url(#nodeShadow04)"/>
      <text x="-10" y="-96" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="18" font-weight="bold" fill="#B04A5C">明清</text>
      <text x="-10" y="-72" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="15" fill="#3A3530">「蓝靛所」</text>
      <text x="-10" y="-52" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="13" fill="#9B948B">《天工开物》系统记载</text>
      <line x1="-10" y1="-20" x2="-10" y2="-30" stroke="#B04A5C" stroke-width="2" stroke-dasharray="3,3"/>
      <text x="-10" y="56" text-anchor="middle" font-family="KaiTi, STKaiti, Georgia, serif" font-size="14" fill="#7A7068" letter-spacing="2">集成</text>
    </g>
  </g>

  <g id="bottom-quote" transform="translate(60,620)">
    <use data-icon="tabler-filled/book" x="0" y="0" width="28" height="28" fill="#C99E62"/>
    <text x="44" y="22" font-family="KaiTi, STKaiti, Georgia, serif" font-size="18" fill="#3A3530">典籍传承 · 《齐民要术》《天工开物》《考工记》《大明会典》</text>
  </g>

  <g id="footer">
    <line x1="60" y1="690" x2="1220" y2="690" stroke="#D7CEB9" stroke-width="1"/>
    <text x="60" y="710" font-family="KaiTi, STKaiti, Georgia, serif" font-size="12" fill="#9B948B">裁云织月 · 草木成诗</text>
    <text x="1220" y="710" text-anchor="end" font-family="KaiTi, STKaiti, Georgia, serif" font-size="12" fill="#9B948B">04 / 12</text>
  </g>
</svg>
