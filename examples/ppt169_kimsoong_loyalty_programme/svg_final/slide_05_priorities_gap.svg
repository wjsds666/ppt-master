  <text x="880" y="632" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#5D6D7E">#6</text>

  
  
  <rect x="160" y="150" width="420" height="230" fill="#2D8A4E" fill-opacity="0.05" />
  
