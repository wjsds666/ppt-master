      <stop offset="0%" stop-color="#1A3A5C" />
      <stop offset="100%" stop-color="#2D8A4E" />
    </linearGradient>
    <filter id="barShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
