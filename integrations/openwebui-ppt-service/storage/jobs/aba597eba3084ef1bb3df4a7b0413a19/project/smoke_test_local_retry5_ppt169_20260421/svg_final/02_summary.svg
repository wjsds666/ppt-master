<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F62FE" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>
    <linearGradient id="cardTopGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="6" result="offsetBlur" />
      <feFlood flood-color="#0F172A" flood-opacity="0.10" result="shadowColor" />
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow" />
      <feMerge>
        <feMergeNode in="shadow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="blueGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
      <feFlood flood-color="#0F62FE" flood-opacity="0.22" result="glowColor" />
      <feComposite in="glowColor" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="greenGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
      <feFlood flood-color="#16A34A" flood-opacity="0.20" result="glowColor" />
      <feComposite in="glowColor" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF" />

  <g id="decorative-background">
    <circle cx="1140" cy="90" r="120" fill="#38BDF8" fill-opacity="0.07" />
    <circle cx="1185" cy="125" r="72" fill="#0F62FE" fill-opacity="0.05" />
    <rect x="60" y="88" width="1160" height="2" fill="#CBD5E1" />
  </g>

  <g id="header">
    <path fill="url(#headerGrad)" d="M64,52 H142 A4,4 0 0 1 146,56 V56 A4,4 0 0 1 142,60 H64 A4,4 0 0 1 60,56 V56 A4,4 0 0 1 64,52 Z" />
    <text x="60" y="120" font-family="Microsoft YaHei" font-size="30" font-weight="700" fill="#0F172A">收入同比增长18%，华东拉动增量，但新客成本上升需持续关注</text>
    <text x="60" y="152" font-family="Microsoft YaHei" font-size="18" fill="#475569">短期增长由收入提升与区域贡献支撑，但增长质量仍需平衡拉新成本与复购改善。</text>
  </g>

  <g id="summary-band">
    <path fill="#F8FAFC" d="M76,178 H1204 A16,16 0 0 1 1220,194 V236 A16,16 0 0 1 1204,252 H76 A16,16 0 0 1 60,236 V194 A16,16 0 0 1 76,178 Z" />
    <path fill="#0F62FE" d="M64,178 H64 A4,4 0 0 1 68,182 V248 A4,4 0 0 1 64,252 H64 A4,4 0 0 1 60,248 V182 A4,4 0 0 1 64,178 Z" />
    <text x="90" y="210" font-family="Microsoft YaHei" font-size="16" fill="#94A3B8">经营摘要</text>
    <text x="90" y="234" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#0F172A">增长明确、区域集中、拉新承压、复购改善</text>
  </g>

  <g id="card-growth">
    <path fill="#FFFFFF" filter="url(#softShadow)" d="M76,276 H414 A16,16 0 0 1 430,292 V600 A16,16 0 0 1 414,616 H76 A16,16 0 0 1 60,600 V292 A16,16 0 0 1 76,276 Z" />
    <path fill="url(#cardTopGrad)" d="M76,276 H414 A16,16 0 0 1 430,292 V600 A16,16 0 0 1 414,616 H76 A16,16 0 0 1 60,600 V292 A16,16 0 0 1 76,276 Z" />
    <path fill="#0F62FE" d="M63,276 H427 A3,3 0 0 1 430,279 V279 A3,3 0 0 1 427,282 H63 A3,3 0 0 1 60,279 V279 A3,3 0 0 1 63,276 Z" />
    <g id="card-growth-head">
      <path fill="#0F62FE" fill-opacity="0.10" d="M102,304 H130 A14,14 0 0 1 144,318 V346 A14,14 0 0 1 130,360 H102 A14,14 0 0 1 88,346 V318 A14,14 0 0 1 102,304 Z" />
      
  <g transform="translate(104.0, 320.0)" fill="none" stroke="#0F62FE">
    <path d="M3 13a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v6a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1l0 -6" />
    <path d="M15 9a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v10a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1l0 -10" />
    <path d="M9 5a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v14a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1l0 -14" />
    <path d="M4 20h14" />
  </g>
      <text x="158" y="327" font-family="Microsoft YaHei" font-size="16" fill="#475569">增长结果</text>
      <text x="158" y="353" font-family="Microsoft YaHei" font-size="24" font-weight="700" fill="#0F172A">收入同比增长</text>
    </g>
    <g id="card-growth-kpi">
      <text x="88" y="455" font-family="SimHei, Microsoft YaHei" font-size="82" font-weight="700" fill="#0F62FE" filter="url(#blueGlow)">18%</text>
      <line x1="88" y1="475" x2="212" y2="475" stroke="#38BDF8" stroke-width="4" />
      <text font-family="Microsoft YaHei" fill="#475569" font-size="18" x="88" y="516">可作为当前阶段最明确的</text><text font-family="Microsoft YaHei" fill="#475569" font-size="18" x="88" y="544">正向信号，说明业务总量</text><text font-family="Microsoft YaHei" fill="#475569" font-size="18" x="88" y="572">仍保持增长韧性。</text></g>
  </g>

  <g id="card-region">
    <path fill="#FFFFFF" filter="url(#softShadow)" d="M471,276 H809 A16,16 0 0 1 825,292 V600 A16,16 0 0 1 809,616 H471 A16,16 0 0 1 455,600 V292 A16,16 0 0 1 471,276 Z" />
    <path fill="url(#cardTopGrad)" d="M471,276 H809 A16,16 0 0 1 825,292 V600 A16,16 0 0 1 809,616 H471 A16,16 0 0 1 455,600 V292 A16,16 0 0 1 471,276 Z" />
    <path fill="#38BDF8" d="M458,276 H822 A3,3 0 0 1 825,279 V279 A3,3 0 0 1 822,282 H458 A3,3 0 0 1 455,279 V279 A3,3 0 0 1 458,276 Z" />
    <g id="card-region-head">
      <path fill="#38BDF8" fill-opacity="0.12" d="M497,304 H525 A14,14 0 0 1 539,318 V346 A14,14 0 0 1 525,360 H497 A14,14 0 0 1 483,346 V318 A14,14 0 0 1 497,304 Z" />
      
  <g transform="translate(499.0, 320.0)" fill="none" stroke="#0F62FE">
    <path d="M9 11a3 3 0 1 0 6 0a3 3 0 0 0 -6 0" />
    <path d="M17.657 16.657l-4.243 4.243a2 2 0 0 1 -2.827 0l-4.244 -4.243a8 8 0 1 1 11.314 0" />
  </g>
      <text x="553" y="327" font-family="Microsoft YaHei" font-size="16" fill="#475569">区域贡献</text>
      <text x="553" y="353" font-family="Microsoft YaHei" font-size="24" font-weight="700" fill="#0F172A">华东区拉动主要增量</text>
    </g>
    <g id="card-region-kpi">
      <path fill="#0F62FE" fill-opacity="0.08" d="M495,392 H785 A12,12 0 0 1 797,404 V438 A12,12 0 0 1 785,450 H495 A12,12 0 0 1 483,438 V404 A12,12 0 0 1 495,392 Z" />
      <text x="507" y="429" font-family="Microsoft YaHei" font-size="28" font-weight="700" fill="#0F62FE">主要增量来源集中于华东</text>
      <text font-family="Microsoft YaHei" fill="#475569" font-size="18" x="483" y="502">说明增长来源相对集中，</text><text font-family="Microsoft YaHei" fill="#475569" font-size="18" x="483" y="530">当前区域结构具备拉动效应，</text><text font-family="Microsoft YaHei" fill="#475569" font-size="18" x="483" y="558">也提示后续需要关注均衡性。</text></g>
  </g>

  <g id="card-structure">
    <path fill="#FFFFFF" filter="url(#softShadow)" d="M866,276 H1204 A16,16 0 0 1 1220,292 V600 A16,16 0 0 1 1204,616 H866 A16,16 0 0 1 850,600 V292 A16,16 0 0 1 866,276 Z" />
    <path fill="url(#cardTopGrad)" d="M866,276 H1204 A16,16 0 0 1 1220,292 V600 A16,16 0 0 1 1204,616 H866 A16,16 0 0 1 850,600 V292 A16,16 0 0 1 866,276 Z" />
    <path fill="#16A34A" d="M853,276 H1217 A3,3 0 0 1 1220,279 V279 A3,3 0 0 1 1217,282 H853 A3,3 0 0 1 850,279 V279 A3,3 0 0 1 853,276 Z" />
    <g id="card-structure-head">
      <path fill="#16A34A" fill-opacity="0.10" d="M892,304 H920 A14,14 0 0 1 934,318 V346 A14,14 0 0 1 920,360 H892 A14,14 0 0 1 878,346 V318 A14,14 0 0 1 892,304 Z" />
      
  <g transform="translate(894.0, 320.0)" fill="none" stroke="#DC2626">
    <path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0 -8 0" />
    <path d="M16 19h6" />
    <path d="M19 16v6" />
    <path d="M6 21v-2a4 4 0 0 1 4 -4h4" />
  </g>
      <text x="948" y="327" font-family="Microsoft YaHei" font-size="16" fill="#475569">经营结构</text>
      <text x="948" y="353" font-family="Microsoft YaHei" font-size="24" font-weight="700" fill="#0F172A">拉新承压，复购改善</text>
    </g>
    <g id="structure-mini-warning">
      <path fill="#DC2626" fill-opacity="0.08" d="M892,388 H1014 A14,14 0 0 1 1028,402 V470 A14,14 0 0 1 1014,484 H892 A14,14 0 0 1 878,470 V402 A14,14 0 0 1 892,388 Z" />
      
  <g transform="translate(894.0, 404.0) scale(0.9166666666666666)" fill="none" stroke="#DC2626">
    <path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0 -8 0" />
    <path d="M16 19h6" />
    <path d="M19 16v6" />
    <path d="M6 21v-2a4 4 0 0 1 4 -4h4" />
  </g>
      <text x="926" y="421" font-family="Microsoft YaHei" font-size="15" fill="#475569">新客成本</text>
      <text x="894" y="458" font-family="SimHei, Microsoft YaHei" font-size="30" font-weight="700" fill="#DC2626">上升</text>
      <text x="894" y="476" font-family="Microsoft YaHei" font-size="14" fill="#475569">拉新效率承压</text>
    </g>
    <g id="structure-mini-success">
      <path fill="#16A34A" fill-opacity="0.08" d="M1056,388 H1178 A14,14 0 0 1 1192,402 V470 A14,14 0 0 1 1178,484 H1056 A14,14 0 0 1 1042,470 V402 A14,14 0 0 1 1056,388 Z" />
      
  <g transform="translate(1058.0, 404.0) scale(0.9166666666666666)" fill="none" stroke="#16A34A">
    <path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4" />
    <path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4" />
  </g>
      <text x="1090" y="421" font-family="Microsoft YaHei" font-size="15" fill="#475569">复购表现</text>
      <text x="1058" y="458" font-family="SimHei, Microsoft YaHei" font-size="30" font-weight="700" fill="#16A34A" filter="url(#greenGlow)">改善</text>
      <text x="1058" y="476" font-family="Microsoft YaHei" font-size="14" fill="#475569">存量经营优化</text>
    </g>
    <g id="structure-note">
      <text font-family="Microsoft YaHei" fill="#475569" font-size="18" x="878" y="529">增长质量的关键，在于后续持续</text><text font-family="Microsoft YaHei" fill="#475569" font-size="18" x="878" y="557">平衡获客投入与老客价值释放。</text></g>
  </g>

  <g id="footer">
    <line x1="60" y1="654" x2="1220" y2="654" stroke="#CBD5E1" stroke-width="1" />
    <text x="60" y="682" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8">注：所有表述严格依据原始素材，不补充未经提供的市场、渠道或时间维度数据。</text>
    <text x="1218" y="682" text-anchor="end" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8">02</text>
  </g>
</svg>