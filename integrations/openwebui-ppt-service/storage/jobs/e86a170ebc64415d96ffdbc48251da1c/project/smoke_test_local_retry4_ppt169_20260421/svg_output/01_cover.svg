<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="55%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F62FE"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="overlayGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6" result="offsetBlur"/>
      <feFlood flood-color="#0F172A" flood-opacity="0.10" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="titleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#38BDF8" flood-opacity="0.35" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#bgGrad)"/>

  <g id="background-decor">
    <circle cx="1120" cy="120" r="180" fill="#38BDF8" fill-opacity="0.10"/>
    <circle cx="1210" cy="260" r="220" fill="#0F62FE" fill-opacity="0.08"/>
    <circle cx="1030" cy="590" r="210" fill="#16A34A" fill-opacity="0.06"/>
    <rect x="930" y="80" width="240" height="240" rx="40" fill="#0F62FE" fill-opacity="0.05" transform="rotate(12 1050 200)"/>
    <rect x="1010" y="430" width="180" height="180" rx="36" fill="#38BDF8" fill-opacity="0.08" transform="rotate(-14 1100 520)"/>
  </g>

  <g id="background-placeholder">
    <rect x="640" y="60" width="580" height="600" rx="24" fill="#FFFFFF" fill-opacity="0.38" stroke="#94A3B8" stroke-width="2" stroke-dasharray="10,8"/>
    <rect x="660" y="80" width="540" height="560" rx="20" fill="#F8FAFC" fill-opacity="0.42"/>
    <line x1="700" y1="140" x2="1160" y2="540" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="1160" y1="140" x2="700" y2="540" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="730" y="170" width="400" height="220" rx="18" fill="none" stroke="#CBD5E1" stroke-width="2"/>
    <circle cx="810" cy="260" r="42" fill="none" stroke="#38BDF8" stroke-width="3"/>
    <rect x="880" y="225" width="170" height="12" rx="6" fill="#CBD5E1"/>
    <rect x="880" y="255" width="130" height="12" rx="6" fill="#CBD5E1"/>
    <rect x="880" y="285" width="150" height="12" rx="6" fill="#CBD5E1"/>
    <rect x="745" y="440" width="350" height="12" rx="6" fill="#CBD5E1"/>
    <rect x="745" y="470" width="300" height="12" rx="6" fill="#CBD5E1"/>
    <rect x="745" y="500" width="330" height="12" rx="6" fill="#CBD5E1"/>
    <text x="930" y="600" text-anchor="middle" font-family="Microsoft YaHei" font-size="22" fill="#94A3B8">封面背景占位（16:9，可替换为商务/城市/数据感背景）</text>
  </g>

  <rect x="0" y="0" width="1280" height="720" fill="url(#overlayGrad)"/>

  <g id="left-panel" filter="url(#softShadow)">
    <rect x="60" y="70" width="630" height="580" rx="28" fill="#FFFFFF"/>
    <rect x="60" y="70" width="630" height="580" rx="28" fill="url(#panelGrad)" fill-opacity="0.03"/>
  </g>

  <g id="header-tag">
    <rect x="96" y="108" width="180" height="38" rx="19" fill="#0F62FE" fill-opacity="0.10"/>
    <circle cx="118" cy="127" r="6" fill="#16A34A"/>
    <text x="136" y="133" font-family="Microsoft YaHei" font-size="18" font-weight="700" fill="#0F62FE">本地联调测试</text>
  </g>

  <g id="title-block">
    <text x="96" y="220" font-family="Microsoft YaHei" font-size="44" font-weight="700" fill="#0F172A" filter="url(#titleGlow)">经营表现呈现</text>
    <text x="96" y="278" font-family="SimHei, Microsoft YaHei" font-size="58" font-weight="700" fill="#0F62FE">增长韧性</text>
    <rect x="96" y="304" width="120" height="6" rx="3" fill="#16A34A"/>
    <text x="96" y="352" font-family="Microsoft YaHei" font-size="22" fill="#475569">本次汇报聚焦增长结果、区域来源与经营质量变化三项核心信息。</text>
  </g>

  <g id="key-metric-card" filter="url(#softShadow)">
    <rect x="96" y="390" width="246" height="132" rx="20" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="120" y="432" font-family="Microsoft YaHei" font-size="18" fill="#475569">核心结论</text>
    <text x="120" y="490" font-family="SimHei, Microsoft YaHei" font-size="54" font-weight="700" fill="#16A34A">+18%</text>
    <text x="120" y="520" font-family="Microsoft YaHei" font-size="18" fill="#475569">收入同比增长</text>
  </g>

  <g id="bullet-list">
    <g id="bullet-1">
      <rect x="374" y="390" width="276" height="52" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
      <circle cx="404" cy="416" r="11" fill="#0F62FE" fill-opacity="0.10"/>
      <circle cx="404" cy="416" r="4" fill="#0F62FE"/>
      <text x="430" y="423" font-family="Microsoft YaHei" font-size="20" fill="#0F172A">主题：本地联调测试</text>
    </g>
    <g id="bullet-2">
      <rect x="374" y="456" width="276" height="52" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
      <use data-icon="tabler-outline/chart-bar" x="390" y="470" width="24" height="24" fill="#0F62FE"/>
      <text x="430" y="489" font-family="Microsoft YaHei" font-size="20" fill="#0F172A">核心结论：收入同比增长18%</text>
    </g>
    <g id="bullet-3">
      <rect x="374" y="522" width="276" height="82" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
      <use data-icon="tabler-outline/refresh" x="390" y="536" width="24" height="24" fill="#16A34A"/>
      <text x="430" y="555" font-family="Microsoft YaHei" font-size="20" fill="#0F172A">关注点：区域增量、新客成本、</text>
      <text x="430" y="583" font-family="Microsoft YaHei" font-size="20" fill="#0F172A">复购改善</text>
    </g>
  </g>

  <g id="right-side-callout" filter="url(#softShadow)">
    <rect x="916" y="572" width="264" height="74" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <use data-icon="tabler-outline/map-pin" x="940" y="596" width="24" height="24" fill="#0F62FE"/>
    <text x="976" y="603" font-family="Microsoft YaHei" font-size="16" fill="#475569">后续重点追踪</text>
    <text x="976" y="627" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#0F172A">区域增量来源与经营质量变化</text>
  </g>

  <g id="footer">
    <text x="60" y="688" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8">来源：来自源文档标题与三条要点</text>
    <text x="1220" y="688" text-anchor="end" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8">01</text>
  </g>
</svg>
