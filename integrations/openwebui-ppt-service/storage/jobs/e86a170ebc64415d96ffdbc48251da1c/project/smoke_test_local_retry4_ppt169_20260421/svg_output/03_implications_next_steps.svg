<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F62FE"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6" result="offsetBlur"/>
      <feFlood flood-color="#0F172A" flood-opacity="0.12" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="blueGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feFlood flood-color="#0F62FE" flood-opacity="0.22" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#bgGrad)"/>

  <g id="decorative-background">
    <circle cx="1170" cy="88" r="92" fill="#38BDF8" fill-opacity="0.08"/>
    <circle cx="1088" cy="144" r="48" fill="#0F62FE" fill-opacity="0.06"/>
    <circle cx="85" cy="642" r="88" fill="#16A34A" fill-opacity="0.06"/>
    <rect x="60" y="108" width="1160" height="2" fill="url(#accentLine)"/>
  </g>

  <g id="header">
    <text x="60" y="56" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8">本地联调测试｜经营含义与后续动作</text>
    <text x="60" y="94" font-family="Microsoft YaHei" font-size="30" font-weight="700" fill="#0F172A">增长延续的关键在于控新客成本、放大复购价值</text>
    <text x="60" y="126" font-family="Microsoft YaHei" font-size="18" fill="#475569">下一步应围绕获客效率优化与重点区域复用增长经验展开。</text>
  </g>

  <g id="left-panel">
    <rect x="60" y="160" width="560" height="500" rx="24" fill="url(#heroGrad)" filter="url(#softShadow)"/>
    <rect x="60" y="160" width="560" height="500" rx="24" fill="#0F172A" fill-opacity="0.12"/>
    <g id="left-panel-top">
      <rect x="92" y="194" width="128" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.16"/>
      <text x="156" y="217" text-anchor="middle" font-family="Microsoft YaHei" font-size="15" font-weight="700" fill="#FFFFFF">经营判断</text>
    </g>
    <g id="left-core-message">
      <text x="92" y="286" font-family="Microsoft YaHei" font-size="42" font-weight="700" fill="#FFFFFF" filter="url(#blueGlow)">
        <tspan x="92" dy="0">增长具备延续基础，</tspan>
        <tspan x="92" dy="58">但新增获客效率承压</tspan>
      </text>
      <text x="92" y="388" font-family="Microsoft YaHei" font-size="19" fill="#E2E8F0">
        <tspan x="92" dy="0">基于现有信息，可以明确看到三个信号：</tspan>
      </text>
    </g>

    <g id="signal-1">
      <circle cx="104" cy="438" r="16" fill="#FFFFFF" fill-opacity="0.20"/>
      <text x="104" y="444" text-anchor="middle" font-family="SimHei" font-size="16" fill="#FFFFFF">1</text>
      <text x="132" y="445" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#FFFFFF">收入仍保持同比增长</text>
      <text x="132" y="472" font-family="Microsoft YaHei" font-size="16" fill="#E2E8F0">说明业务基本盘具备一定韧性与延续空间</text>
    </g>

    <g id="signal-2">
      <circle cx="104" cy="518" r="16" fill="#FFFFFF" fill-opacity="0.20"/>
      <text x="104" y="524" text-anchor="middle" font-family="SimHei" font-size="16" fill="#FFFFFF">2</text>
      <text x="132" y="525" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#FFFFFF">华东区贡献主要增量</text>
      <text x="132" y="552" font-family="Microsoft YaHei" font-size="16" fill="#E2E8F0">说明增长并非平均分布，存在可复盘的区域打法</text>
    </g>

    <g id="signal-3">
      <circle cx="104" cy="598" r="16" fill="#FFFFFF" fill-opacity="0.20"/>
      <text x="104" y="604" text-anchor="middle" font-family="SimHei" font-size="16" fill="#FFFFFF">3</text>
      <text x="132" y="605" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#FFFFFF">新客成本上升、复购改善</text>
      <text x="132" y="632" font-family="Microsoft YaHei" font-size="16" fill="#E2E8F0">说明后续增长更应依赖效率优化与老客价值挖掘</text>
    </g>
  </g>

  <g id="right-panel">
    <g id="section-heading">
      <text x="676" y="192" font-family="Microsoft YaHei" font-size="16" fill="#0F62FE" font-weight="700">下一步聚焦</text>
      <text x="676" y="226" font-family="Microsoft YaHei" font-size="24" font-weight="700" fill="#0F172A">围绕成本、复制与追踪，形成闭环动作</text>
    </g>

    <g id="card-1" filter="url(#softShadow)">
      <rect x="660" y="256" width="560" height="114" rx="16" fill="#FFFFFF"/>
      <rect x="660" y="256" width="6" height="114" rx="3" fill="#0F62FE"/>
      <rect x="686" y="282" width="52" height="52" rx="12" fill="#EFF6FF"/>
      <use data-icon="tabler-outline/chart-bar" x="700" y="296" width="24" height="24" stroke="#0F62FE" fill="none"/>
      <text x="756" y="302" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#0F172A">经营判断</text>
      <text x="756" y="332" font-family="Microsoft YaHei" font-size="18" fill="#475569">当前增长具备延续基础，但新增获客效率承压</text>
    </g>

    <g id="card-2" filter="url(#softShadow)">
      <rect x="660" y="392" width="560" height="114" rx="16" fill="#FFFFFF"/>
      <rect x="660" y="392" width="6" height="114" rx="3" fill="#16A34A"/>
      <rect x="686" y="418" width="52" height="52" rx="12" fill="#F0FDF4"/>
      <use data-icon="tabler-outline/map-pin" x="700" y="432" width="24" height="24" stroke="#16A34A" fill="none"/>
      <text x="756" y="438" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#0F172A">动作建议</text>
      <text x="756" y="468" font-family="Microsoft YaHei" font-size="18" fill="#475569">复盘华东区增长来源，提炼可复制打法</text>
    </g>

    <g id="card-3" filter="url(#softShadow)">
      <rect x="660" y="528" width="560" height="114" rx="16" fill="#FFFFFF"/>
      <rect x="660" y="528" width="6" height="114" rx="3" fill="#38BDF8"/>
      <rect x="686" y="554" width="52" height="52" rx="12" fill="#F0F9FF"/>
      <use data-icon="tabler-outline/refresh" x="700" y="568" width="24" height="24" stroke="#38BDF8" fill="none"/>
      <text x="756" y="574" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#0F172A">管理重点</text>
      <text x="756" y="604" font-family="Microsoft YaHei" font-size="18" fill="#475569">关注新客成本趋势，并持续追踪复购改善质量</text>
    </g>
  </g>

  <g id="footer">
    <text x="60" y="688" font-family="Microsoft YaHei" font-size="13" fill="#94A3B8">基于“华东区贡献主要增量、新客成本上升、复购改善”三条信息提炼经营含义与后续动作，不新增未给出的量化数据。</text>
    <text x="1220" y="688" text-anchor="end" font-family="Arial" font-size="16" fill="#94A3B8">03</text>
  </g>
</svg>
