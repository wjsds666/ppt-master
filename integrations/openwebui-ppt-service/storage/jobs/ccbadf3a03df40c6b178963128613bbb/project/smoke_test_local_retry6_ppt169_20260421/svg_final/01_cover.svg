<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FBFF" />
      <stop offset="55%" stop-color="#F2FAFF" />
      <stop offset="100%" stop-color="#ECFDF5" />
    </linearGradient>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F62FE" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F62FE" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#16A34A" stop-opacity="0.9" />
    </linearGradient>
    <radialGradient id="orbBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.20" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="orbGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#16A34A" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#16A34A" stop-opacity="0" />
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
      <feOffset dx="0" dy="8" result="offsetBlur" />
      <feFlood flood-color="#0F172A" flood-opacity="0.12" result="shadowColor" />
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow" />
      <feMerge>
        <feMergeNode in="shadow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="titleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur" />
      <feFlood flood-color="#38BDF8" flood-opacity="0.35" result="glowColor" />
      <feComposite in="glowColor" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF" />

  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="url(#bgGrad)" />
    <circle cx="1020" cy="165" r="250" fill="url(#orbBlue)" />
    <circle cx="1135" cy="535" r="235" fill="url(#orbGreen)" />
    <circle cx="885" cy="395" r="150" fill="url(#orbBlue)" />
    <path d="M740 90 C930 40, 1110 80, 1260 180" fill="none" stroke="#38BDF8" stroke-width="2" stroke-opacity="0.20" />
    <path d="M770 130 C950 90, 1115 130, 1240 250" fill="none" stroke="#0F62FE" stroke-width="2" stroke-opacity="0.12" />
    <path d="M760 470 C940 400, 1090 460, 1240 620" fill="none" stroke="#16A34A" stroke-width="2" stroke-opacity="0.14" />
  </g>

  <g id="right-placeholder-visual">
    <path fill="#FFFFFF" fill-opacity="0.70" stroke="#CBD5E1" stroke-width="1.5" filter="url(#softShadow)" d="M848,118 H1162 A28,28 0 0 1 1190,146 V546 A28,28 0 0 1 1162,574 H848 A28,28 0 0 1 820,546 V146 A28,28 0 0 1 848,118 Z" />
    <path fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="10,8" d="M872,152 H1138 A22,22 0 0 1 1160,174 V522 A22,22 0 0 1 1138,544 H872 A22,22 0 0 1 850,522 V174 A22,22 0 0 1 872,152 Z" />
    <g id="placeholder-decoration">
      <path fill="#E2E8F0" d="M895,228 H1117 A7,7 0 0 1 1124,235 V235 A7,7 0 0 1 1117,242 H895 A7,7 0 0 1 888,235 V235 A7,7 0 0 1 895,228 Z" />
      <path fill="#E2E8F0" d="M895,262 H1069 A7,7 0 0 1 1076,269 V269 A7,7 0 0 1 1069,276 H895 A7,7 0 0 1 888,269 V269 A7,7 0 0 1 895,262 Z" />
      <path fill="#E2E8F0" d="M894,440 H1036 A6,6 0 0 1 1042,446 V446 A6,6 0 0 1 1036,452 H894 A6,6 0 0 1 888,446 V446 A6,6 0 0 1 894,440 Z" />
      <path fill="#E2E8F0" d="M894,470 H1088 A6,6 0 0 1 1094,476 V476 A6,6 0 0 1 1088,482 H894 A6,6 0 0 1 888,476 V476 A6,6 0 0 1 894,470 Z" />
      <circle cx="938" cy="354" r="48" fill="#DBEAFE" />
      <circle cx="1027" cy="328" r="34" fill="#D1FAE5" />
      <circle cx="1080" cy="392" r="22" fill="#E0F2FE" />
      <path d="M910 375 C960 320, 1010 320, 1060 360" fill="none" stroke="url(#lineGrad)" stroke-width="5" />
      <polygon points="1054,354 1075,360 1060,376" fill="#16A34A" />
    </g>
    <g id="placeholder-label">
      <text x="1005" y="520" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#475569">封面抽象背景占位</text>
      <text x="1005" y="548" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#94A3B8">后续可替换为浅色商务抽象图</text>
    </g>
  </g>

  <g id="content-panel">
    <path fill="#FFFFFF" fill-opacity="0.88" stroke="#FFFFFF" stroke-width="1" filter="url(#softShadow)" d="M88,78 H682 A28,28 0 0 1 710,106 V610 A28,28 0 0 1 682,638 H88 A28,28 0 0 1 60,610 V106 A28,28 0 0 1 88,78 Z" />
    <path fill="#FFFFFF" fill-opacity="0.28" d="M88,78 H682 A28,28 0 0 1 710,106 V610 A28,28 0 0 1 682,638 H88 A28,28 0 0 1 60,610 V106 A28,28 0 0 1 88,78 Z" />
  </g>

  <g id="header-mark">
    <path fill="#EFF6FF" d="M124,126 H180 A24,24 0 0 1 204,150 V206 A24,24 0 0 1 180,230 H124 A24,24 0 0 1 100,206 V150 A24,24 0 0 1 124,126 Z" />
    
  <g transform="translate(128.0, 154.0) scale(2.0)" fill="none" stroke="#0F62FE">
    <path d="M3 4l18 0" />
    <path d="M4 4v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-10" />
    <path d="M12 16l0 4" />
    <path d="M9 20l6 0" />
    <path d="M8 12l3 -3l2 2l3 -3" />
  </g>
    <path fill="url(#heroGrad)" d="M228,162 H366 A6,6 0 0 1 372,168 V168 A6,6 0 0 1 366,174 H228 A6,6 0 0 1 222,168 V168 A6,6 0 0 1 228,162 Z" />
    <text x="222" y="205" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="bold" fill="#0F62FE">阶段性业务结果概览</text>
  </g>

  <g id="title-block">
    <text x="100" y="308" font-family="Microsoft YaHei, Arial, sans-serif" font-size="54" font-weight="bold" fill="#0F172A" filter="url(#titleGlow)">本地联调测试</text>
    <text x="100" y="364" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="bold" fill="#475569">显示业务延续增长态势</text>
    <path fill="url(#lineGrad)" d="M103,392 H517 A3,3 0 0 1 520,395 V395 A3,3 0 0 1 517,398 H103 A3,3 0 0 1 100,395 V395 A3,3 0 0 1 103,392 Z" />
  </g>

  <g id="takeaway-card">
    <path fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" d="M118,434 H622 A18,18 0 0 1 640,452 V524 A18,18 0 0 1 622,542 H118 A18,18 0 0 1 100,524 V452 A18,18 0 0 1 118,434 Z" />
    <text x="124" y="472" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" fill="#16A34A">核心结论</text>
    <text font-family="Microsoft YaHei, Arial, sans-serif" fill="#0F172A" font-weight="bold" font-size="24" x="124" y="507">本次测试样本显示收入增长、区域增量集中、</text><text font-family="Microsoft YaHei, Arial, sans-serif" fill="#0F172A" font-weight="bold" font-size="24" x="124" y="541">用户经营结构正在变化。</text></g>

  <g id="meta-line">
    <line x1="100" y1="586" x2="640" y2="586" stroke="#CBD5E1" stroke-width="1.5" />
    <text x="100" y="618" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#94A3B8">基于 source_text.md 提炼</text>
    <text x="640" y="618" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#94A3B8">源文档仅包含3条业务结论，封面页不扩展额外事实</text>
  </g>

  <g id="corner-decoration">
    <circle cx="1184" cy="96" r="10" fill="#38BDF8" fill-opacity="0.55" />
    <circle cx="1212" cy="96" r="10" fill="#16A34A" fill-opacity="0.55" />
    <circle cx="1240" cy="96" r="10" fill="#0F62FE" fill-opacity="0.55" />
  </g>
</svg>