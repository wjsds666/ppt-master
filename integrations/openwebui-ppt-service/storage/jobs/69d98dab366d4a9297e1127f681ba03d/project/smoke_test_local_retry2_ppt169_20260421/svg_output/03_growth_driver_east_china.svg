<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="5" result="offsetBlur"/>
      <feFlood flood-color="#0F172A" flood-opacity="0.10" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feFlood flood-color="#38BDF8" flood-opacity="0.35" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

  <g id="background-decor">
    <circle cx="1150" cy="90" r="120" fill="#38BDF8" fill-opacity="0.06"/>
    <circle cx="1080" cy="150" r="72" fill="#1565C0" fill-opacity="0.05"/>
    <rect x="0" y="0" width="1280" height="10" fill="url(#titleGrad)"/>
  </g>

  <g id="header">
    <rect x="60" y="50" width="8" height="74" rx="4" fill="#1565C0"/>
    <text x="86" y="84" font-family="Microsoft YaHei" font-size="30" font-weight="700" fill="#0F172A">增长来源：华东区是当前最主要的增量贡献区域</text>
    <text x="86" y="117" font-family="Microsoft YaHei" font-size="18" fill="#475569">区域贡献并不均衡，华东区是本轮增长判断中的关键支点。</text>
    <line x1="60" y1="145" x2="1220" y2="145" stroke="#CBD5E1" stroke-width="1"/>
  </g>

  <g id="left-column">
    <rect x="60" y="176" width="446" height="464" rx="16" fill="url(#panelGrad)" filter="url(#softShadow)"/>

    <g id="left-intro">
      <text x="92" y="222" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#1565C0">核心判断</text>
      <text x="92" y="262" font-family="SimHei" font-size="42" font-weight="700" fill="#0F172A">华东区</text>
      <text x="92" y="302" font-family="Microsoft YaHei" font-size="28" font-weight="700" fill="#0F172A">是当前增量的关键支点</text>
      <rect x="92" y="324" width="110" height="6" rx="3" fill="#16A34A"/>
    </g>

    <g id="bullet-card-1">
      <rect x="92" y="360" width="382" height="74" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
      <rect x="108" y="378" width="42" height="42" rx="10" fill="#EFF6FF"/>
      <use data-icon="tabler-outline/map-pin" x="117" y="387" width="24" height="24" fill="#1565C0"/>
      <text x="166" y="404" font-family="Microsoft YaHei" font-size="18" font-weight="700" fill="#0F172A">源文档明确指出：</text>
      <text x="166" y="426" font-family="Microsoft YaHei" font-size="18" fill="#475569">华东区贡献主要增量</text>
    </g>

    <g id="bullet-card-2">
      <rect x="92" y="450" width="382" height="92" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
      <rect x="108" y="468" width="42" height="42" rx="10" fill="#F0FDF4"/>
      <use data-icon="tabler-outline/repeat" x="117" y="477" width="24" height="24" fill="#16A34A"/>
      <text x="166" y="491" font-family="Microsoft YaHei" font-size="18" font-weight="700" fill="#0F172A">建议动作：</text>
      <text x="166" y="514" font-family="Microsoft YaHei" font-size="18" fill="#475569">将华东区作为复盘重点，</text>
      <text x="166" y="537" font-family="Microsoft YaHei" font-size="18" fill="#475569">提炼可复制的增长动作</text>
    </g>

    <g id="bullet-card-3">
      <rect x="92" y="558" width="382" height="110" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
      <rect x="108" y="576" width="42" height="42" rx="10" fill="#F8FAFC"/>
      <text x="129" y="604" text-anchor="middle" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#94A3B8">03</text>
      <text x="166" y="600" font-family="Microsoft YaHei" font-size="18" font-weight="700" fill="#0F172A">表达原则：</text>
      <text x="166" y="623" font-family="Microsoft YaHei" font-size="18" fill="#475569">其余区域以待补充数据形式呈现，</text>
      <text x="166" y="646" font-family="Microsoft YaHei" font-size="18" fill="#475569">避免在当前阶段过度推断</text>
    </g>
  </g>

  <g id="right-column">
    <rect x="534" y="176" width="686" height="464" rx="16" fill="#FFFFFF" filter="url(#softShadow)"/>
    <rect x="534" y="176" width="686" height="464" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>

    <g id="right-header">
      <text x="566" y="222" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#1565C0">区域示意（占位）</text>
      <text x="566" y="250" font-family="Microsoft YaHei" font-size="16" fill="#475569">源文档未提供各区域拆分数据，本页以结论表达和示意容器为主</text>
    </g>

    <g id="map-placeholder-frame">
      <rect x="566" y="276" width="622" height="270" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="10,6"/>
      <text x="877" y="312" text-anchor="middle" font-family="Microsoft YaHei" font-size="16" fill="#94A3B8">east_china_map_placeholder.png</text>
      <text x="877" y="334" text-anchor="middle" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8">区域分布 / 中国地图示意占位，突出华东区域位置</text>
    </g>

    <g id="schematic-map">
      <rect x="702" y="358" width="54" height="38" rx="10" fill="#E2E8F0"/>
      <rect x="760" y="335" width="76" height="52" rx="12" fill="#E2E8F0"/>
      <rect x="832" y="320" width="68" height="56" rx="12" fill="#E2E8F0"/>
      <rect x="894" y="338" width="58" height="52" rx="12" fill="#DBEAFE"/>
      <rect x="950" y="350" width="44" height="60" rx="12" fill="#BFDBFE" filter="url(#glowBlue)"/>
      <rect x="812" y="386" width="78" height="56" rx="12" fill="#E2E8F0"/>
      <rect x="888" y="396" width="60" height="54" rx="12" fill="#CFFAFE"/>
      <rect x="744" y="396" width="62" height="48" rx="12" fill="#E2E8F0"/>
      <rect x="926" y="418" width="42" height="34" rx="10" fill="#16A34A" fill-opacity="0.22"/>
      <circle cx="964" cy="380" r="11" fill="#1565C0"/>
      <circle cx="964" cy="380" r="21" fill="#38BDF8" fill-opacity="0.18"/>
      <use data-icon="tabler-outline/map-pin" x="952" y="368" width="24" height="24" fill="#FFFFFF"/>
      <line x1="985" y1="380" x2="1068" y2="380" stroke="#1565C0" stroke-width="2"/>
      <polygon points="1068,380 1058,374 1058,386" fill="#1565C0"/>
      <rect x="1074" y="353" width="84" height="54" rx="12" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
      <text x="1116" y="377" text-anchor="middle" font-family="Microsoft YaHei" font-size="16" font-weight="700" fill="#1565C0">华东区</text>
      <text x="1116" y="396" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" fill="#475569">主要增量来源</text>
    </g>

    <g id="analysis-note">
      <rect x="566" y="565" width="622" height="51" rx="12" fill="#F8FAFC"/>
      <text x="590" y="594" font-family="Microsoft YaHei" font-size="17" fill="#475569">
        当前建议：先锁定华东经验，再补充其他区域数据，避免在证据不足时做比例判断。
      </text>
    </g>
  </g>

  <g id="footer">
    <line x1="60" y1="675" x2="1220" y2="675" stroke="#CBD5E1" stroke-width="1"/>
    <text x="60" y="698" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8">注：源文档未提供各区域拆分数据，因此本页以结论表达和占位示意为主，不使用虚构比例。</text>
    <text x="1218" y="698" text-anchor="end" font-family="Arial" font-size="14" fill="#94A3B8">03</text>
  </g>
</svg>
