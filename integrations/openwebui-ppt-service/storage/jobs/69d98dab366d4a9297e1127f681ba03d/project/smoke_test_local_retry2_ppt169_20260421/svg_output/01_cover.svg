<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6" result="offsetBlur"/>
      <feFlood flood-color="#1565C0" flood-opacity="0.10" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="titleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#38BDF8" flood-opacity="0.30" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#bgGrad)"/>

  <g id="background-decor">
    <circle cx="1110" cy="110" r="180" fill="#38BDF8" fill-opacity="0.08"/>
    <circle cx="1180" cy="640" r="220" fill="#1565C0" fill-opacity="0.05"/>
    <circle cx="950" cy="300" r="120" fill="#16A34A" fill-opacity="0.05"/>
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF" fill-opacity="0.24"/>
    <rect x="60" y="72" width="6" height="576" rx="3" fill="url(#accentGrad)"/>
  </g>

  <g id="header-meta">
    <text x="90" y="104" font-family="Microsoft YaHei" font-size="16" fill="#94A3B8">smoke_test_local_retry2</text>
    <rect x="90" y="122" width="160" height="4" rx="2" fill="url(#accentGrad)"/>
  </g>

  <g id="title-block">
    <text x="90" y="210" font-family="Microsoft YaHei" font-size="46" font-weight="700" fill="#0F172A" filter="url(#titleGlow)">
      <tspan x="90" dy="0">本地联调测试：收入增长延续，</tspan>
      <tspan x="90" dy="60">但增长质量仍需观察</tspan>
    </text>
    <text x="90" y="318" font-family="Microsoft YaHei" font-size="22" fill="#475569">
      当前业务呈现“规模增长、区域集中、效率分化”的阶段性特征。
    </text>
    <text x="90" y="356" font-family="Microsoft YaHei" font-size="16" fill="#94A3B8">
      封面结论直接汇总源文档三条信息，不新增外部数据
    </text>
  </g>

  <g id="bullet-summary" filter="url(#softShadow)">
    <rect x="90" y="406" width="546" height="196" rx="16" fill="url(#panelGrad)" stroke="#CBD5E1"/>
    <g id="bullet-1">
      <circle cx="126" cy="454" r="10" fill="#16A34A" fill-opacity="0.12" stroke="#16A34A" stroke-width="2"/>
      <text x="152" y="461" font-family="Microsoft YaHei" font-size="24" font-weight="700" fill="#0F172A">收入同比增长18%</text>
    </g>
    <g id="bullet-2">
      <circle cx="126" cy="504" r="10" fill="#1565C0" fill-opacity="0.12" stroke="#1565C0" stroke-width="2"/>
      <text x="152" y="511" font-family="Microsoft YaHei" font-size="24" font-weight="700" fill="#0F172A">华东区贡献主要增量</text>
    </g>
    <g id="bullet-3">
      <circle cx="126" cy="554" r="10" fill="#DC2626" fill-opacity="0.12" stroke="#DC2626" stroke-width="2"/>
      <text x="152" y="561" font-family="Microsoft YaHei" font-size="24" font-weight="700" fill="#0F172A">新客成本上升，复购改善</text>
    </g>
  </g>

  <g id="right-visual-panel" filter="url(#softShadow)">
    <rect x="766" y="86" width="454" height="548" rx="24" fill="#FFFFFF" stroke="#CBD5E1"/>
    <g id="placeholder-image">
      <rect x="798" y="118" width="390" height="262" rx="18" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="10,8"/>
      <g id="placeholder-icon-group">
        <rect x="953" y="194" width="80" height="80" rx="20" fill="#E0F2FE"/>
        <use data-icon="tabler-outline/chart-bar" x="969" y="210" width="48" height="48" stroke="#1565C0" fill="none"/>
      </g>
      <text x="993" y="302" text-anchor="middle" font-family="Microsoft YaHei" font-size="18" fill="#475569">16:9浅色商务抽象背景占位</text>
      <text x="993" y="330" text-anchor="middle" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8">右侧或底部留白便于放标题</text>
      <text x="993" y="352" text-anchor="middle" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8">cover_bg_placeholder.png</text>
    </g>

    <g id="mini-insight-cards">
      <g id="card-growth">
        <rect x="798" y="416" width="114" height="150" rx="16" fill="#F8FAFC" stroke="#CBD5E1"/>
        <use data-icon="tabler-outline/chart-bar" x="833" y="442" width="44" height="44" stroke="#1565C0" fill="none"/>
        <text x="855" y="510" text-anchor="middle" font-family="SimHei" font-size="28" fill="#1565C0">+18%</text>
        <text x="855" y="538" text-anchor="middle" font-family="Microsoft YaHei" font-size="14" fill="#475569">收入同比</text>
      </g>
      <g id="card-region">
        <rect x="936" y="416" width="114" height="150" rx="16" fill="#F8FAFC" stroke="#CBD5E1"/>
        <use data-icon="tabler-outline/map-pin" x="971" y="442" width="44" height="44" stroke="#1565C0" fill="none"/>
        <text x="993" y="510" text-anchor="middle" font-family="SimHei" font-size="24" fill="#1565C0">华东区</text>
        <text x="993" y="538" text-anchor="middle" font-family="Microsoft YaHei" font-size="14" fill="#475569">主要增量</text>
      </g>
      <g id="card-quality">
        <rect x="1074" y="416" width="114" height="150" rx="16" fill="#F8FAFC" stroke="#CBD5E1"/>
        <use data-icon="tabler-outline/repeat" x="1109" y="442" width="44" height="44" stroke="#16A34A" fill="none"/>
        <text x="1131" y="510" text-anchor="middle" font-family="SimHei" font-size="24" fill="#16A34A">复购改善</text>
        <text x="1131" y="538" text-anchor="middle" font-family="Microsoft YaHei" font-size="14" fill="#475569">对冲压力</text>
      </g>
    </g>
  </g>

  <g id="footer">
    <line x1="90" y1="664" x2="1190" y2="664" stroke="#CBD5E1" stroke-width="1"/>
    <text x="90" y="690" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8">内部经营复盘简报</text>
    <text x="1190" y="690" text-anchor="end" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8">01</text>
  </g>
</svg>
