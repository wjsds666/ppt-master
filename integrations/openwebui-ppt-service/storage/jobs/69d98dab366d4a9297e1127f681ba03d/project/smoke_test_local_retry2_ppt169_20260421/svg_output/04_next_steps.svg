<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6" result="offsetBlur"/>
      <feFlood flood-color="#1565C0" flood-opacity="0.10" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="titleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#38BDF8" flood-opacity="0.30" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#bgGrad)"/>

  <g id="decorative-cluster-top-right">
    <circle cx="1130" cy="90" r="82" fill="#38BDF8" fill-opacity="0.06"/>
    <circle cx="1185" cy="55" r="28" fill="#1565C0" fill-opacity="0.08"/>
    <circle cx="1080" cy="42" r="10" fill="#16A34A" fill-opacity="0.14"/>
  </g>

  <g id="decorative-cluster-bottom-left">
    <circle cx="120" cy="640" r="72" fill="#1565C0" fill-opacity="0.05"/>
    <circle cx="80" cy="600" r="22" fill="#38BDF8" fill-opacity="0.10"/>
    <circle cx="180" cy="676" r="12" fill="#16A34A" fill-opacity="0.12"/>
  </g>

  <g id="header">
    <rect x="470" y="72" width="340" height="8" rx="4" fill="url(#accentGrad)"/>
    <text x="640" y="126" text-anchor="middle" font-family="Microsoft YaHei" font-size="30" font-weight="700" fill="#0F172A" filter="url(#titleGlow)">下一步重点：放大华东经验，同时优化新客获取效率</text>
    <text x="640" y="168" text-anchor="middle" font-family="Microsoft YaHei" font-size="18" fill="#475569">后续应围绕“复制有效增长动作”和“修复拉新效率”两条主线推进</text>
  </g>

  <g id="strategy-pill" filter="url(#softShadow)">
    <rect x="360" y="200" width="560" height="72" rx="36" fill="#FFFFFF"/>
    <rect x="372" y="212" width="256" height="48" rx="24" fill="#1565C0"/>
    <rect x="652" y="212" width="256" height="48" rx="24" fill="#16A34A"/>
    <text x="500" y="243" text-anchor="middle" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#FFFFFF">复制华东有效经验</text>
    <text x="780" y="243" text-anchor="middle" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#FFFFFF">修复新客获取效率</text>
  </g>

  <g id="card-1" filter="url(#softShadow)">
    <rect x="220" y="310" width="840" height="88" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
    <rect x="244" y="330" width="48" height="48" rx="24" fill="#EFF6FF"/>
    <use data-icon="tabler-outline/map-pin" x="256" y="342" width="24" height="24" fill="#1565C0"/>
    <text x="320" y="346" font-family="Microsoft YaHei" font-size="18" font-weight="700" fill="#1565C0">动作一｜聚焦增量来源</text>
    <text x="320" y="374" font-family="Microsoft YaHei" font-size="18" fill="#0F172A">复盘华东区主要增量来源，沉淀可复制打法</text>
  </g>

  <g id="card-2" filter="url(#softShadow)">
    <rect x="220" y="422" width="840" height="88" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
    <rect x="244" y="442" width="48" height="48" rx="24" fill="#FEF2F2"/>
    <use data-icon="tabler-outline/user-plus" x="256" y="454" width="24" height="24" fill="#DC2626"/>
    <text x="320" y="458" font-family="Microsoft YaHei" font-size="18" font-weight="700" fill="#DC2626">动作二｜修复拉新效率</text>
    <text x="320" y="486" font-family="Microsoft YaHei" font-size="18" fill="#0F172A">重点跟踪新客成本变化，优化拉新投放与转化链路</text>
  </g>

  <g id="card-3" filter="url(#softShadow)">
    <rect x="220" y="534" width="840" height="88" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
    <rect x="244" y="554" width="48" height="48" rx="24" fill="#F0FDF4"/>
    <use data-icon="tabler-outline/repeat" x="256" y="566" width="24" height="24" fill="#16A34A"/>
    <text x="320" y="570" font-family="Microsoft YaHei" font-size="18" font-weight="700" fill="#16A34A">动作三｜验证经营韧性</text>
    <text x="320" y="598" font-family="Microsoft YaHei" font-size="18" fill="#0F172A">持续观察复购改善是否能够稳定对冲获客成本压力</text>
  </g>

  <g id="footer-note">
    <line x1="60" y1="664" x2="1220" y2="664" stroke="#CBD5E1"/>
    <text x="60" y="692" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8">说明：行动建议由源文档三条结论自然延伸，未引入额外事实判断。</text>
    <text x="1220" y="692" text-anchor="end" font-family="Arial" font-size="14" fill="#94A3B8">04</text>
  </g>
</svg>
