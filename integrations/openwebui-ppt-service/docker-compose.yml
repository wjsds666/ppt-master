version: "3.9"

services:
  ppt-api:
    build:
      context: ../..
      dockerfile: integrations/openwebui-ppt-service/Dockerfile
    env_file:
      - .env
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8099
    ports:
      - "8099:8099"
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped

  ppt-worker:
    build:
      context: ../..
      dockerfile: integrations/openwebui-ppt-service/Dockerfile
    env_file:
      - .env
    command: python -m app_worker
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped
